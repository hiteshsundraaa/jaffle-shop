name: SemZero Assumption Gate

on:
  pull_request:
  push:
    branches:
      - semzero-action-fresh-test
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  semzero:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hiteshsundraaa/semzero-public-alpha-launch@9ea53f1b47ae05b14a3a7c4f2162b7c10cf8b952
        with:
          mode: shadow
          run-dbt-compile: "true"
          extra-pip-packages: "dbt-core dbt-duckdb"
          dbt-profiles-dir: ".semzero"

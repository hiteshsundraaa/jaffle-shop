name: SemZero Assumption Gate

on:
  pull_request:
  push:
    branches:
      - semzero-action-fresh-test
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  semzero:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hiteshsundraaa/semzero-public-alpha-launch@adaa5fee55e9f7d7cb3188994a40446c6c9ea0f3
        with:
          mode: shadow
          run-dbt-compile: "true"
          extra-pip-packages: "dbt-core dbt-duckdb"
          dbt-profiles-dir: ".semzero"

name: SemZero Assumption Gate

on:
  pull_request:
  push:
    branches:
      - semzero-action-fresh-test
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  semzero:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hiteshsundraaa/semzero-public-alpha-launch@a5f70e3cf7d4a85073dc21c0edaaeaf0e917cbd1
        with:
          mode: shadow
          run-dbt-compile: "true"
          extra-pip-packages: "dbt-core dbt-duckdb"
          dbt-profiles-dir: ".semzero"
